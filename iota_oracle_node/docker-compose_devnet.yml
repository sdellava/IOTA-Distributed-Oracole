services:
  oracle-node-1:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: oracle-node-1
    restart: unless-stopped
    init: true
    stop_signal: SIGTERM
    stop_grace_period: 120s
    env_file:
      - .env
    environment:
      NODE_ID: "1"
      NODE_OPTIONS: --dns-result-order=ipv4first
    dns:
      - 1.1.1.1
      - 8.8.8.8
    ports:
      - "9080:9080"
    command: ["node", "--import", "tsx", "src/index.ts", "--node", "1"]
    volumes:
      - ./keys:/app/keys

  oracle-node-2:
